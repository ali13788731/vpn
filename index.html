<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نمایش پیام‌های تلگرام</title>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #e5ddd5; margin: 0; padding: 20px; }
        .chat-container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .message-bubble { background-color: #dcf8c6; padding: 15px; margin-bottom: 15px; border-radius: 15px 15px 0 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .message-text { font-size: 14px; color: #000; white-space: pre-wrap; }
        .message-date { font-size: 11px; color: #888; text-align: left; margin-top: 10px; }
        .reload-btn { display: block; width: 100%; padding: 10px; background: #0088cc; color: #fff; text-align: center; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-bottom: 20px;}
        .reload-btn:hover { background: #0077b3; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>پیام‌های دریافت شده</h2>
    <button class="reload-btn" onclick="loadMessages()">🔄 بروزرسانی نمایش</button>
    <div id="messages-list">در حال بارگذاری پیام‌ها... (اگر پیام‌ها نیامد، مطمئن شوید Action اجرا شده است)</div>
</div>

<script>
    async function loadMessages() {
        const listDiv = document.getElementById('messages-list');
        listDiv.innerHTML = "در حال خواندن فایل...";
        try {
            // خواندن فایل جیسون تولید شده توسط پایتون
            const response = await fetch('messages.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('فایل یافت نشد');
            const messages = await response.json();
            
            listDiv.innerHTML = "";
            if (messages.length === 0) {
                listDiv.innerHTML = "پیامی یافت نشد.";
                return;
            }

            messages.forEach(msg => {
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.innerHTML = `
                    <div class="message-text">${msg.text}</div>
                    <div class="message-date">${msg.date}</div>
                `;
                listDiv.appendChild(bubble);
            });
        } catch (error) {
            listDiv.innerHTML = "❌ خطا در بارگذاری پیام‌ها. مطمئن شوید Action با موفقیت اجرا شده و فایل messages.json ساخته شده است.";
        }
    }
    
    // اجرای خودکار هنگام باز شدن صفحه
    loadMessages();
</script>

</body>
</html>
