name: V2Ray Collector & SpeedTester

on:
  schedule:
    - cron: '*/30 * * * *' # اجرا در هر ۳۰ دقیقه
  workflow_dispatch: # قابلیت اجرای دستی

# جلوگیری از اجرای موازی (بسیار مهم برای حالت سخت‌گیرانه)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run collector and tester script
        env:
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python collector.py 

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          git add sub.txt sub_raw.txt
          
          if git diff --staged --quiet; then
            echo "No fast configs found or tested successfully. Skipping commit."
          else
            git commit -m "Update & Filtered by Speed: $(date +'%Y-%m-%d %H:%M')"
            git push --force
          fi
