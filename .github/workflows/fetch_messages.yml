name: Fetch Telegram Messages (UI)

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: 'آیدی کانال تلگرام (بدون @)'
        required: true
        default: 'napsternetv'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install telethon

      - name: Run Fetcher Script
        env:
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TARGET_CHANNEL: ${{ github.event.inputs.channel_id }}
        run: python message_fetcher.py 

      - name: Commit and Push JSON
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add messages.json
          if git diff --staged --quiet; then
            echo "تغییری در پیام‌ها یافت نشد."
          else
            git commit -m "Update messages.json via UI"
            git push --force
          fi
