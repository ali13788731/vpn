# .github/workflows/viewer.yml
name: Generate Channel Message View

on:
  issues:
    types: [opened, edited]

jobs:
  build:
    # فقط زمانی اجرا شو که issue برچسب 'get-messages' را داشته باشد
    if: contains(github.event.issue.labels.*.name, 'get-messages')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run channel viewer script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
        # عنوان issue به عنوان ورودی به اسکریپت داده می‌شود
        run: python channel_viewer.py "${{ github.event.issue.title }}"

      - name: Commit and push the generated HTML file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add channel_view.html
          # اگر فایلی برای کامیت وجود داشت، آن را کامیت کن
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit."
          else
            git commit -m "Generate message view for: ${{ github.event.issue.title }}"
            git push
          fi

      - name: Post comment and close issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.issue.number;
            const repo_owner = context.repo.owner;
            const repo_name = context.repo.repo;
